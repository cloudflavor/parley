stages:
  - validate
  - release

default:
  image: rust:1.88
  before_script:
    - rustup component add rustfmt clippy

fmt:
  stage: validate
  script:
    - cargo fmt --all -- --check

clippy:
  stage: validate
  script:
    - cargo clippy --all-targets --all-features -- -D warnings

test:
  stage: validate
  script:
    - cargo test --all-targets --all-features

.release_job:
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - when: manual
  allow_failure: true
  artifacts:
    expire_in: 7 days

build_release_amd64_linux:
  extends: .release_job
  script:
    - cargo build --release --locked --bin parley
    - mkdir -p /dist/x86_64-unknown-linux-gnu
    - mv target/release/parley /dist/x86_64-unknown-linux-gnu/parley
  artifacts:
    paths:
      - /dist/x86_64-unknown-linux-gnu/parley
    expire_in: 7 days

build_release_aarch64_linux:
  extends: .release_job
  script:
    - cargo build --release --locked --bin parley
    - mkdir -p /dist/aarch64-unknown-linux-gnu
    - mv target/release/parley /dist/aarch64-unknown-linux-gnu/parley
  artifacts:
    paths:
      - /dist/aarch64-unknown-linux-gnu/parley
    expire_in: 7 days

build_release_aarch64_macos:
  extends: .release_job
  tags:
    - macos
    - arm64
  before_script:
    - rustup component add rustfmt clippy
  script:
    - cargo build --release --locked --bin parley
    - mkdir -p /dist/aarch64-apple-darwin
    - mv target/release/parley /dist/aarch64-apple-darwin/parley
  artifacts:
    paths:
      - /dist/aarch64-apple-darwin/parley
    expire_in: 7 days
