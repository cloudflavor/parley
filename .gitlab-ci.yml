stages:
  - validate

default:
  image: rust:1.87
  before_script:
    - rustup component add rustfmt clippy

fmt:
  stage: validate
  script:
    - cargo fmt --all -- --check

clippy:
  stage: validate
  script:
    - cargo clippy --all-targets --all-features -- -D warnings

test:
  stage: validate
  script:
    - cargo test --all-targets --all-features
